<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>护心饮食DIY | AR营养评分</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 避免拍照时误选文字，提升AR感 */
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000000;
            overflow: hidden;
            font-family: system-ui, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            height: 100vh;
            width: 100vw;
            position: fixed;
        }

        /* 相机层: 全屏取景 */
        .camera-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: #0a0c12;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 遮罩增强AR质感: 模仿取景框/轻微暗角 */
        .viewfinder-mask {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.2) 100%);
            pointer-events: none;
            z-index: 2;
        }

        /* ----- AR 悬浮卡片 (完全参照设计图) ----- */
        .ar-card {
            position: absolute;
            bottom: 24px;
            left: 16px;
            right: 16px;
            background: rgba(10, 14, 23, 0.82);
            backdrop-filter: blur(24px);
            border-radius: 40px;
            padding: 20px 22px 26px;
            border: 1px solid rgba(255, 215, 0, 0.35);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.5), 0 0 0 0.5px rgba(255, 215, 0, 0.2);
            transition: opacity 0.25s ease, transform 0.2s ease;
            z-index: 20;
            opacity: 1; /* 卡片始终可见, 但具体数值展示占位符或者?号 */
            transform: translateY(0);
        }

        /* 头部：护心饮食DIY评分 + 大分数区域 */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .title-main {
            font-size: 18px;
            font-weight: 600;
            color: #FFE6A3;
            letter-spacing: 0.5px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
            background: rgba(255,215,0,0.15);
            padding: 4px 12px;
            border-radius: 40px;
        }

        .score-badge {
            text-align: right;
        }

        .score-number {
            font-size: 52px;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, #FFDF85, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 8px rgba(255,200,0,0.3);
        }

        .score-unit {
            font-size: 20px;
            font-weight: 600;
            color: #FFD966;
            margin-left: 4px;
        }

        /* 成分表标题 + 能量行 */
        .component-title {
            font-size: 15px;
            font-weight: 600;
            color: rgba(255,255,230,0.9);
            margin: 18px 0 12px 0;
            letter-spacing: 0.5px;
            border-left: 3px solid #FFC107;
            padding-left: 12px;
        }

        .energy-row {
            background: rgba(0,0,0,0.35);
            border-radius: 28px;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 18px;
            backdrop-filter: blur(4px);
        }

        .energy-label {
            font-size: 14px;
            color: #CFD8DC;
            font-weight: 500;
        }

        .energy-value {
            font-size: 20px;
            font-weight: 700;
            color: #FFE484;
        }

        .energy-unit {
            font-size: 12px;
            font-weight: 400;
            color: #B0BEC5;
        }

        /* 营养网格 3列: 蛋白质 / 碳水化合物 / 脂类 */
        .macro-grid {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 20px;
        }

        .macro-item {
            flex: 1;
            background: rgba(30, 35, 48, 0.6);
            border-radius: 24px;
            padding: 10px 0;
            text-align: center;
            backdrop-filter: blur(4px);
        }

        .macro-label {
            font-size: 13px;
            color: #BDC5D4;
            margin-bottom: 6px;
        }

        .macro-number {
            font-size: 24px;
            font-weight: 700;
            color: #FFDE9E;
        }

        .macro-percent {
            font-size: 12px;
            color: #FFC97A;
            margin-left: 2px;
        }

        /* 纤维 & 均衡 & 控险 三列特殊样式 */
        .special-grid {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
        }

        .special-card {
            flex: 1;
            background: rgba(20, 25, 38, 0.7);
            border-radius: 28px;
            padding: 12px 6px;
            text-align: center;
            border-bottom: 2px solid rgba(255, 193, 7, 0.5);
        }

        .special-label {
            font-size: 13px;
            font-weight: 500;
            color: #E0E7FF;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .special-value {
            font-size: 22px;
            font-weight: 700;
            color: #FFD966;
        }

        .special-unit {
            font-size: 11px;
            color: #B9C7D9;
        }

        /* 百分比条样式(仅纤维等可以使用进度条，图中纤维物质占比类似进度，我用百分比数字+微进度线) */
        .fiber-progress {
            margin-top: 6px;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            width: 80%;
            margin-left: auto;
            margin-right: auto;
            overflow: hidden;
        }
        .fiber-fill {
            width: 0%;
            height: 100%;
            background: #FFC107;
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        /* 占位符样式 (未拍照时) */
        .placeholder-blur {
            color: #9aa7b9;
            filter: blur(2px);
            background: rgba(150,150,170,0.2);
            display: inline-block;
            border-radius: 8px;
            min-width: 48px;
            text-align: center;
        }
        .score-placeholder {
            font-size: 52px;
            font-weight: 800;
            color: #6C7A8E;
            filter: blur(2px);
            background: rgba(200,200,220,0.2);
            border-radius: 20px;
            display: inline-block;
            padding: 0 8px;
        }
        .value-placeholder {
            filter: blur(3px);
            background: rgba(160,170,190,0.25);
            border-radius: 12px;
            display: inline-block;
            min-width: 45px;
            color: transparent;
        }
        .waiting-text {
            font-size: 14px;
            font-weight: normal;
            color: #BAC8D9;
            letter-spacing: 0.5px;
        }

        /* 拍照按钮 (圆形 + 金色环形) */
        .shutter-btn {
            position: absolute;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(12px);
            border: 2px solid #FFD966;
            z-index: 30;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .shutter-inner {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #FFD966, #E6A017);
            transition: 0.1s linear;
        }

        .shutter-btn:active .shutter-inner {
            transform: scale(0.88);
            background: #F5BC42;
        }

        /* 扫码启动提示 + 加载分析状态 */
        .scan-toast {
            position: absolute;
            top: 50px;
            left: 16px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(20px);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            color: #FFE6A3;
            z-index: 25;
            border-left: 3px solid #FFC107;
            pointer-events: none;
        }

        .analyzing-overlay {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(16px);
            border-radius: 60px;
            padding: 14px 26px;
            z-index: 40;
            display: none;
            align-items: center;
            gap: 12px;
            white-space: nowrap;
            border: 1px solid rgba(255,215,0,0.4);
            color: #FFECB3;
            font-weight: 500;
            font-size: 16px;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,215,0,0.3);
            border-top: 2px solid #FFD966;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* 辅助隐藏类 */
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<div class="camera-layer">
    <video id="cameraVideo" autoplay playsinline muted></video>
    <div class="viewfinder-mask"></div>
</div>

<!-- AR 评分卡片 (未拍照时，所有数值显示为 问号/占位符/加载中) -->
<div class="ar-card" id="arCard">
    <div class="card-header">
        <div class="title-main">❤️ 护心饮食DIY评分</div>
        <div class="score-badge" id="scoreArea">
            <span class="score-number" id="mainScore">?</span>
            <span class="score-unit">分</span>
        </div>
    </div>

    <!-- 成分表 -->
    <div class="component-title">📋 成分表</div>

    <!-- 能量栏 -->
    <div class="energy-row">
        <span class="energy-label">⚡ 能量</span>
        <div>
            <span class="energy-value" id="energyValue">----</span>
            <span class="energy-unit"> kJ</span>
        </div>
    </div>

    <!-- 三大宏量: 蛋白质 碳水化合物 脂类 -->
    <div class="macro-grid">
        <div class="macro-item">
            <div class="macro-label">🥩 蛋白质</div>
            <div><span class="macro-number" id="proteinVal">?</span><span class="macro-percent" id="proteinPercentSign">%</span></div>
        </div>
        <div class="macro-item">
            <div class="macro-label">🍚 碳水化合物</div>
            <div><span class="macro-number" id="carbsVal">?</span><span class="macro-percent" id="carbsPercentSign">%</span></div>
        </div>
        <div class="macro-item">
            <div class="macro-label">🧈 脂类</div>
            <div><span class="macro-number" id="fatVal">?</span><span class="macro-percent" id="fatPercentSign">%</span></div>
        </div>
    </div>

    <!-- 纤维物质占比 + 均衡 + 控险 (完全复刻图中风格) -->
    <div class="special-grid">
        <div class="special-card">
            <div class="special-label">🌾 纤维物质占比</div>
            <div><span class="special-value" id="fiberPercent">?</span><span class="special-unit">%</span></div>
            <div class="fiber-progress"><div class="fiber-fill" id="fiberFillBar" style="width:0%"></div></div>
        </div>
        <div class="special-card">
            <div class="special-label">⚖️ 均衡</div>
            <div><span class="special-value" id="balanceVal">?</span><span class="special-unit">分</span></div>
        </div>
        <div class="special-card">
            <div class="special-label">⚠️ 控险</div>
            <div><span class="special-value" id="riskVal">?</span><span class="special-unit">级</span></div>
        </div>
    </div>
    <!-- 天然小标 (装饰) -->
    <div style="text-align: right; margin-top: 12px; font-size: 10px; color: rgba(255,215,140,0.7);">🌿 天然膳食评估</div>
</div>

<!-- 拍照按钮 -->
<div class="shutter-btn" id="shutterButton">
    <div class="shutter-inner"></div>
</div>

<div class="scan-toast" id="scanToast">🔍 扫码启动 | 对准餐盘拍照评分</div>
<div class="analyzing-overlay" id="analyzingOverlay">
    <div class="spinner"></div>
    <span>AI 营养师正在分析餐盘...</span>
</div>

<script>
    (function() {
        // ---------- DOM 元素绑定 ----------
        const video = document.getElementById('cameraVideo');
        const shutterBtn = document.getElementById('shutterButton');
        const analyzingDiv = document.getElementById('analyzingOverlay');
        const scanToast = document.getElementById('scanToast');
        
        // 数值元素
        const mainScoreSpan = document.getElementById('mainScore');
        const energyValueSpan = document.getElementById('energyValue');
        const proteinValSpan = document.getElementById('proteinVal');
        const carbsValSpan = document.getElementById('carbsVal');
        const fatValSpan = document.getElementById('fatVal');
        const fiberPercentSpan = document.getElementById('fiberPercent');
        const fiberFillBar = document.getElementById('fiberFillBar');
        const balanceValSpan = document.getElementById('balanceVal');
        const riskValSpan = document.getElementById('riskVal');
        
        // 存储是否已经分析过（初始未拍照，所有数值均是占位符?，拍照后才填充真实数据）
        let hasAnalyzed = false;
        
        // 为了防止用户连拍，增加锁定
        let isAnalyzing = false;
        
        // 模拟食物营养库 (基于真实场景打分，使评分和数值符合护心营养审美，覆盖范围广)
        // 每次随机从中选择一种“饮食搭配”，但为了效果丰富，同时引入轻微随机变异，使体验不单调
        const mealDatabase = [
            { name:'均衡地中海', score:92, energy:1420, protein:28, carbs:42, fat:18, fiber:36, balance:89, risk:2 },
            { name:'护心轻脂餐', score:88, energy:1180, protein:32, carbs:38, fat:14, fiber:42, balance:85, risk:1 },
            { name:'高纤谷物碗', score:85, energy:1220, protein:24, carbs:48, fat:12, fiber:52, balance:87, risk:1 },
            { name:'优质蛋白盘', score:91, energy:1350, protein:38, carbs:35, fat:16, fiber:30, balance:90, risk:2 },
            { name:'彩虹蔬食', score:94, energy:1080, protein:22, carbs:45, fat:9, fiber:58, balance:95, risk:1 },
            { name:'元气早餐盘', score:80, energy:1150, protein:26, carbs:52, fat:15, fiber:28, balance:77, risk:3 },
            { name:'海陆双拼', score:86, energy:1280, protein:35, carbs:40, fat:19, fiber:31, balance:82, risk:2 },
            { name:'东南亚风味', score:83, energy:1250, protein:27, carbs:47, fat:17, fiber:33, balance:80, risk:2 }
        ];
        
        // 基于图像模拟识别(随机结合微调，让每次拍照都符合膳食逻辑)
        function generateAIScoreFromImage() {
            // 实际开发中替换为真实食物识别API或本地模型，此处使用伪随机+权重模拟
            const baseIndex = Math.floor(Math.random() * mealDatabase.length);
            let meal = { ...mealDatabase[baseIndex] };
            // 增加 ±5% 内浮动，使连续拍照出现不同但合理的变化
            const variance = (Math.random() - 0.5) * 0.1; // -5% ~ +5%
            const varianceInt = (val) => Math.min(100, Math.max(10, Math.round(val * (1 + variance))));
            let finalScore = varianceInt(meal.score);
            finalScore = Math.min(99, Math.max(65, finalScore));
            let finalEnergy = varianceInt(meal.energy);
            let finalProtein = varianceInt(meal.protein);
            let finalCarbs = varianceInt(meal.carbs);
            let finalFat = varianceInt(meal.fat);
            let finalFiber = varianceInt(meal.fiber);
            let finalBalance = varianceInt(meal.balance);
            let finalRisk = meal.risk;
            // 控险等级: 偶尔微调
            if (Math.random() > 0.7) finalRisk = Math.min(4, finalRisk + (Math.random() > 0.5 ? 1 : -1));
            finalRisk = Math.max(1, Math.min(4, finalRisk));
            
            // 保证三大营养总和接近100 但不严格限制（美观调整）
            let total = finalProtein + finalCarbs + finalFat;
            if (total > 100) {
                let ratio = 100 / total;
                finalProtein = Math.round(finalProtein * ratio);
                finalCarbs = Math.round(finalCarbs * ratio);
                finalFat = Math.round(finalFat * ratio);
            }
            return {
                score: finalScore,
                energy: finalEnergy,
                protein: finalProtein,
                carbs: finalCarbs,
                fat: finalFat,
                fiber: finalFiber,
                balance: finalBalance,
                risk: finalRisk
            };
        }
        
        // 更新所有UI，移除问号，显示真实评分数据
        function updateUIWithNutrition(data) {
            // 主分数
            mainScoreSpan.innerText = data.score;
            mainScoreSpan.style.filter = 'none';
            mainScoreSpan.style.background = 'linear-gradient(135deg, #FFDF85, #FFB347)';
            mainScoreSpan.style.webkitBackgroundClip = 'text';
            mainScoreSpan.style.backgroundClip = 'text';
            mainScoreSpan.style.color = 'transparent';
            // 能量
            energyValueSpan.innerText = data.energy;
            energyValueSpan.style.filter = 'none';
            energyValueSpan.style.color = '#FFE484';
            // 蛋白质 碳水化合物 脂肪
            proteinValSpan.innerText = data.protein;
            proteinValSpan.style.filter = 'none';
            proteinValSpan.style.color = '#FFDE9E';
            carbsValSpan.innerText = data.carbs;
            carbsValSpan.style.filter = 'none';
            carbsValSpan.style.color = '#FFDE9E';
            fatValSpan.innerText = data.fat;
            fatValSpan.style.filter = 'none';
            fatValSpan.style.color = '#FFDE9E';
            
            // 纤维物质占比
            fiberPercentSpan.innerText = data.fiber;
            fiberPercentSpan.style.filter = 'none';
            fiberPercentSpan.style.color = '#FFD966';
            fiberFillBar.style.width = data.fiber + '%';
            
            // 均衡分
            balanceValSpan.innerText = data.balance;
            balanceValSpan.style.filter = 'none';
            balanceValSpan.style.color = '#FFD966';
            // 控险等级
            let riskText = data.risk;
            riskValSpan.innerText = riskText;
            riskValSpan.style.filter = 'none';
            riskValSpan.style.color = '#FFD966';
            
            // 所有占位效果去除
            const allNumericSpans = [proteinValSpan, carbsValSpan, fatValSpan, fiberPercentSpan, balanceValSpan, riskValSpan, energyValueSpan];
            allNumericSpans.forEach(span => {
                span.classList?.remove('value-placeholder');
                span.style.background = 'none';
            });
        }
        
        // 重置所有数值为 "?" 或者占位符样式 (未拍照时)
        function resetToPlaceholder() {
            mainScoreSpan.innerText = '?';
            mainScoreSpan.style.filter = 'blur(2px)';
            mainScoreSpan.style.background = '#6C7A8E';
            mainScoreSpan.style.webkitBackgroundClip = 'unset';
            mainScoreSpan.style.color = '#9aa7b9';
            mainScoreSpan.style.backgroundClip = 'unset';
            
            energyValueSpan.innerText = '----';
            energyValueSpan.style.filter = 'blur(2px)';
            energyValueSpan.style.color = '#9aa7b9';
            
            proteinValSpan.innerText = '?';
            carbsValSpan.innerText = '?';
            fatValSpan.innerText = '?';
            [proteinValSpan, carbsValSpan, fatValSpan].forEach(span => {
                span.style.filter = 'blur(2px)';
                span.style.color = '#9aa7b9';
            });
            
            fiberPercentSpan.innerText = '?';
            fiberPercentSpan.style.filter = 'blur(2px)';
            fiberPercentSpan.style.color = '#9aa7b9';
            fiberFillBar.style.width = '0%';
            
            balanceValSpan.innerText = '?';
            balanceValSpan.style.filter = 'blur(2px)';
            balanceValSpan.style.color = '#9aa7b9';
            riskValSpan.innerText = '?';
            riskValSpan.style.filter = 'blur(2px)';
            riskValSpan.style.color = '#9aa7b9';
        }
        
        // 拍照并执行AI分析 (模拟真实的识别，展示加载动画)
        async function captureAndRate() {
            if (isAnalyzing) {
                // 防止快速连拍
                return;
            }
            // 如果当前还未分析过，先确保卡片数值为占位符? 其实初始已经是占位符，但可能后期再次分析也要重置？
            // 为了体验: 每次点击拍照都重新加载分析，新评分替换老数据，之前数据清空?
            // 但是为了更好的AR效果，分析前不需要重置，但会显示加载蒙层，分析完成后新数据覆盖.
            isAnalyzing = true;
            analyzingDiv.style.display = 'flex';
            
            // 模拟AI视觉处理延迟 (实际应调用后端或摄像头帧识别，这里模拟真实延迟感)
            await new Promise(resolve => setTimeout(resolve, 1200 + Math.random() * 600));
            
            // 调用模拟识别 (此处可替换为真实的菜品识别API)
            const aiData = generateAIScoreFromImage();
            
            // 更新UI为真实内容，去除问号
            updateUIWithNutrition(aiData);
            
            // 添加AR触感反馈 (支持vibration)
            try {
                if (navigator.vibrate) navigator.vibrate(60);
            } catch(e) {}
            
            // 隐藏加载层
            analyzingDiv.style.display = 'none';
            isAnalyzing = false;
            
            // 可选: 卡片轻微pop动画
            const card = document.querySelector('.ar-card');
            card.style.transform = 'translateY(0px) scale(1.01)';
            setTimeout(() => { card.style.transform = 'translateY(0px) scale(1)'; }, 150);
        }
        
        // 初始化摄像头
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
                });
                video.srcObject = stream;
                await video.play();
            } catch (err) {
                console.warn('Camera error', err);
                const errorMsg = document.createElement('div');
                errorMsg.innerText = '⚠️ 无法访问摄像头，请确保使用HTTPS并允许权限。';
                errorMsg.style.position = 'absolute';
                errorMsg.style.bottom = '30%';
                errorMsg.style.left = '16px';
                errorMsg.style.right = '16px';
                errorMsg.style.backgroundColor = 'rgba(0,0,0,0.8)';
                errorMsg.style.color = '#FFC107';
                errorMsg.style.padding = '12px';
                errorMsg.style.borderRadius = '28px';
                errorMsg.style.textAlign = 'center';
                errorMsg.style.zIndex = '100';
                document.body.appendChild(errorMsg);
            }
        }
        
        // 模拟扫码启动特效
        function simulateQRStart() {
            scanToast.style.transition = '0.2s';
            scanToast.style.backgroundColor = '#FFD966';
            scanToast.style.color = '#1e1e2a';
            scanToast.innerHTML = '✅ 扫码成功 | 智能营养AR已就绪';
            setTimeout(() => {
                scanToast.style.backgroundColor = 'rgba(0,0,0,0.65)';
                scanToast.style.color = '#FFE6A3';
                scanToast.innerHTML = '🔍 护心饮食 | 对准餐盘拍照评分';
            }, 2800);
        }
        
        // 页面启动时全部显示为问号/占位符 (未拍照)
        function initializePlaceholder() {
            resetToPlaceholder();
            // 确保主分数区域样式符合未拍照
            mainScoreSpan.style.filter = 'blur(3px)';
            mainScoreSpan.style.background = 'transparent';
            mainScoreSpan.style.color = '#9aa7b9';
        }
        
        // 绑定拍照按钮事件
        shutterBtn.addEventListener('click', (e) => {
            e.preventDefault();
            captureAndRate();
        });
        
        // 启动相机 & 初始化页面
        initCamera();
        initializePlaceholder();
        simulateQRStart();
        
        // 附加: 确保用户知道要主动拍照，未拍照前所有数值均为?或者加载样式（符合需求）
        // 且拍照后分数出现，完全复刻样式图中85分+各种营养比例、纤维占比、均衡控险等。
        // 设计完全匹配图片样式: 护心饮食DIY评分、成分表、能量、三大营养素、纤维物质占比均衡控险、天然tag
        // 并保留金色界面+玻璃质感
    })();
</script>
